<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

body {

font-family: Arial, sans-serif;

background: linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);

margin: 0;

height: 100vh;

display: flex;
justify-content: center;
align-items: center;

}


/* login box */

.loginBox {

background: #2f3e52;

padding: 30px;

border-radius: 12px;

width: 320px;

box-shadow: 0 8px 25px rgba(0,0,0,0.5);

text-align: center;

color: white;

animation: fadeIn 0.3s;

}


/* title */

.loginBox h2 {

margin-bottom: 20px;

}


/* inputs */

.loginBox input {

width: 90%;

padding: 10px;

margin: 8px 0;

border-radius: 6px;

border: none;

outline: none;

}


/* button */

.loginBox button {

margin-top: 10px;

padding: 10px 20px;

border: none;

border-radius: 6px;

background: #1abc9c;

color: white;

cursor: pointer;

font-weight: bold;

}

.loginBox button:hover {

background: #16a085;

}


@keyframes fadeIn {

from { opacity: 0; transform: scale(0.9); }

to { opacity: 1; transform: scale(1); }

}

    </style>

</head>

<body>


<div class="loginBox">

<h2>Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

</div>


<script src="login.js"></script>

</body>
</html>
