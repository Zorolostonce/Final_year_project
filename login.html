<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {

font-family: Arial, sans-serif;

background: linear-gradient(
135deg,
#4facfe,
#00c6ff
);

margin: 0;

height: 100vh;

display: flex;
justify-content: center;
align-items: center;

}


/* login box */

.loginBox {

background: white;

padding: 30px;

border-radius: 12px;

width: 300px;

box-shadow: 0 6px 20px rgba(0,0,0,0.3);

text-align: center;

animation: fadeIn 0.3s;

}


/* title */

.loginBox h2 {

margin-bottom: 20px;

}


/* inputs */

.loginBox input {

width: 90%;

padding: 8px;

margin: 8px;

border-radius: 6px;

border: 1px solid #ccc;

}


/* button */

.loginBox button {

padding: 8px 20px;

border: none;

border-radius: 6px;

background: #1e90ff;

color: white;

cursor: pointer;

margin-top: 10px;

}

.loginBox button:hover {

background: #0d6efd;

}


/* animation */

@keyframes fadeIn {

from { opacity: 0; transform: scale(0.95); }

to { opacity: 1; transform: scale(1); }

}
    </style>
</head>

<body>

<h2>Login</h2>

<input id="username" placeholder="Username">
<br><br>

<input id="password" type="password" placeholder="Password">
<br><br>

<button onclick="login()">Login</button>

<script src="login.js"></script>

</body>
</html>
