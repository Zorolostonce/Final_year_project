<!DOCTYPE html>
<html>

<head>

<title>Mark Attendance</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
<script>

var role =
localStorage.getItem("role");

if (role !== "teacher") {

    alert("Teacher only");

    window.location =
    "login.html";

}
let round =
localStorage.getItem("roundInProgress");

let page =
window.location.pathname;

if(round && !page.includes("mark")){

alert("Finish attendance first");

window.location = "mark.html";

}
</script>
<div class="navbar">

<a href="index.html">Dashboard</a>
<a href="mark.html">Mark</a>
<a href="history.html">History</a>
<a href="chart.html">Chart</a>

<a href="#" onclick="logout()" title="Logout">
<i class="fa-solid fa-power-off"></i>
</a>

</div>

<h1>Mark Attendance</h1>

Date:
<input type="date" id="date"
onchange="reloadAll()" required>

Subject:
<select id="subject"
onchange="reloadAll()">

<option value="">All</option>
<option value="ECD">ECD</option>
<option value="ML">ML</option>
<option value="MAD">MAD</option>
<option value="OR">OR</option>

</select>
<div id="addStudentBox">

<input
id="newStudentName"
placeholder="New student name"
/>

<button onclick="addStudent()">
Add Student
</button>

</div>

<table id="studentsTable">

<tr>
<th>Name</th>
<th>Present</th>
<th>Absent</th>
<th>Attendance</th>
</tr>

</table>


<script src="script.js"></script>

</body>
</html>
